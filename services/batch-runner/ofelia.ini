[job-exec "daily-ingest"]
schedule = 0 0 17 * * *
container = paper-ingest
command = /usr/bin/wget -qO- --method=POST --header="x-api-key: ${INGEST_API_KEY}" http://localhost:8787/ingest/run-daily

[job-exec "batch-enqueue-submit"]
schedule = 0 30 4 * * *
container = batch-runner
command = /bin/sh -c "python -m batch_runner enqueue && python -m batch_runner submit"

[job-exec "batch-poll-apply"]
schedule = 0 */15 * * * *
container = batch-runner
command = /bin/sh -c "python -m batch_runner poll && python -m batch_runner apply"
